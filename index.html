<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI YouTube Script Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .card { background: #fff; border-radius: 16px; border: 1px solid #e5e5e0; padding: 2rem; max-width: 680px; width: 100%; }
  h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  input[type=text] { flex: 1; font-size: 15px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-family: inherit; }
  input[type=text]:focus { border-color: #999; }
  button { background: #111; color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap; }
  button:disabled { opacity: 0.4; cursor: default; }
  button:hover:not(:disabled) { background: #333; }
  .ideas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .idea-card { border: 1px solid #e5e5e0; border-radius: 12px; padding: 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s; background: #fafaf8; }
  .idea-card:hover { border-color: #bbb; background: #fff; }
  .idea-card.selected { border: 2px solid #111; background: #fff; }
  .idea-title { font-size: 13px; font-weight: 600; color: #111; margin-bottom: 4px; line-height: 1.4; }
  .idea-format { font-size: 11px; background: #f0f0eb; color: #555; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
  .idea-hook { font-size: 12px; color: #777; line-height: 1.4; }
  .script-box { background: #fafaf8; border: 1px solid #e5e5e0; border-radius: 12px; padding: 1.25rem; }
  .script-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .script-text { font-size: 14px; line-height: 1.8; color: #222; white-space: pre-wrap; }
  .copy-btn { margin-top: 12px; background: transparent; color: #111; border: 1px solid #ddd; font-size: 13px; padding: 8px 16px; }
  .copy-btn:hover { background: #f5f5f0; }
  .loading { text-align: center; color: #888; font-size: 14px; padding: 1.5rem 0; }
  .step-hint { font-size: 12px; color: #aaa; margin-bottom: 8px; }
  .api-row { display: flex; gap: 10px; margin-bottom: 1.5rem; align-items: center; }
  .api-label { font-size: 13px; color: #555; white-space: nowrap; }
  .divider { border: none; border-top: 1px solid #f0f0eb; margin: 1.5rem 0; }
  .error { color: #c0392b; font-size: 13px; margin-top: 6px; }
  #apiStatus { font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>AI YouTube Script Generator</h1>
  <p class="sub">Enter a topic → get 4 viral video ideas → click one → get a full script</p>

  <div class="api-row">
    <span class="api-label">API key</span>
    <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="saveKey(this.value)" style="flex:1;font-size:13px;" />
    <span id="apiStatus"></span>
  </div>

  <hr class="divider">

  <p class="step-hint">1. Enter a broad topic</p>
  <div class="row">
    <input type="text" id="topicInput" placeholder="e.g. making money with AI, passive income, ChatGPT tips" />
    <button id="genBtn" onclick="generateIdeas()">Get ideas</button>
  </div>

  <div id="ideasSection" style="display:none">
    <p class="step-hint">2. Click an idea to generate the full script</p>
    <div class="ideas-grid" id="ideasGrid"></div>
  </div>

  <div id="scriptSection" style="display:none">
    <div class="script-box">
      <p class="script-label">Script</p>
      <div class="script-text" id="scriptText"></div>
      <button class="copy-btn" onclick="copyScript()">Copy script</button>
    </div>
  </div>

  <div id="loadingMsg" class="loading" style="display:none">Generating...</div>
  <div id="errorMsg" class="error" style="display:none"></div>
</div>

<script>
let currentScript = '';

function saveKey(val) {
  localStorage.setItem('anthro_key', val);
  const s = document.getElementById('apiStatus');
  s.textContent = val.startsWith('sk-ant-') ? '✓ saved' : '';
  s.style.color = '#2ecc71';
}

window.onload = () => {
  const saved = localStorage.getItem('anthro_key');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    const s = document.getElementById('apiStatus');
    s.textContent = '✓ saved';
    s.style.color = '#2ecc71';
  }
  document.getElementById('topicInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateIdeas();
  });
};

function getKey() { return document.getElementById('apiKey').value.trim(); }

async function callClaude(system, user) {
  const key = getKey();
  if (!key) throw new Error('Please enter your Anthropic API key above.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1200,
      system,
      messages: [{ role: 'user', content: user }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

async function generateIdeas() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) return;
  setLoading(true);
  document.getElementById('ideasSection').style.display = 'none';
  document.getElementById('scriptSection').style.display = 'none';
  try {
    const raw = await callClaude(
      'You generate viral YouTube video ideas for faceless channels about making money online and AI. Respond ONLY with a valid JSON array of exactly 4 objects. No markdown, no explanation, no backticks. Each object: {"title":"...","hook":"one sentence hook","format":"e.g. Top 5 list"}',
      'Topic: ' + topic
    );
    const ideas = JSON.parse(raw.trim());
    renderIdeas(ideas);
  } catch(e) { showError(e.message); }
  setLoading(false);
}

function renderIdeas(ideas) {
  const grid = document.getElementById('ideasGrid');
  grid.innerHTML = '';
  ideas.forEach(idea => {
    const card = document.createElement('div');
    card.className = 'idea-card';
    card.innerHTML =
      '<p class="idea-title">' + escHtml(idea.title) + '</p>' +
      '<span class="idea-format">' + escHtml(idea.format) + '</span>' +
      '<p class="idea-hook">' + escHtml(idea.hook) + '</p>';
    card.onclick = () => selectIdea(card, idea);
    grid.appendChild(card);
  });
  document.getElementById('ideasSection').style.display = 'block';
}

async function selectIdea(card, idea) {
  document.querySelectorAll('.idea-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  setLoading(true);
  document.getElementById('scriptSection').style.display = 'none';
  try {
    const script = await callClaude(
      'You write engaging, ready-to-use scripts for faceless YouTube videos about making money online and AI. Punchy, direct, conversational tone. Structure with these labels on their own lines: [HOOK], [INTRO], [MAIN CONTENT], [CTA]. No markdown. Around 400 words.',
      'Write a full script for: "' + idea.title + '"\nHook concept: ' + idea.hook + '\nFormat: ' + idea.format
    );
    currentScript = script;
    document.getElementById('scriptText').textContent = script;
    document.getElementById('scriptSection').style.display = 'block';
  } catch(e) { showError(e.message); }
  setLoading(false);
}

function copyScript() {
  navigator.clipboard.writeText(currentScript).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy script'; }, 2000);
  });
}

function setLoading(on) {
  document.getElementById('loadingMsg').style.display = on ? 'block' : 'none';
  document.getElementById('genBtn').disabled = on;
  document.getElementById('errorMsg').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
