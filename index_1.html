<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI YouTube Script Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .card { background: #fff; border-radius: 16px; border: 1px solid #e5e5e0; padding: 2rem; max-width: 680px; width: 100%; }
  h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .row { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  input[type=text], input[type=password] { flex: 1; font-size: 15px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-family: inherit; width: 100%; }
  input:focus { border-color: #999; }
  button { background: #111; color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap; }
  button:disabled { opacity: 0.4; cursor: default; }
  button:hover:not(:disabled) { background: #333; }
  .ideas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .idea-card { border: 1px solid #e5e5e0; border-radius: 12px; padding: 14px; cursor: pointer; background: #fafaf8; }
  .idea-card:hover { border-color: #bbb; background: #fff; }
  .idea-card.selected { border: 2px solid #111; background: #fff; }
  .idea-title { font-size: 13px; font-weight: 600; color: #111; margin-bottom: 4px; line-height: 1.4; }
  .idea-format { font-size: 11px; background: #f0f0eb; color: #555; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
  .idea-hook { font-size: 12px; color: #777; line-height: 1.4; }
  .script-box { background: #fafaf8; border: 1px solid #e5e5e0; border-radius: 12px; padding: 1.25rem; }
  .script-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .script-text { font-size: 14px; line-height: 1.8; color: #222; white-space: pre-wrap; }
  .copy-btn { margin-top: 12px; background: transparent; color: #111; border: 1px solid #ddd; font-size: 13px; padding: 8px 16px; }
  .loading { text-align: center; color: #888; font-size: 14px; padding: 1.5rem 0; }
  .step-hint { font-size: 12px; color: #aaa; margin-bottom: 8px; }
  .divider { border: none; border-top: 1px solid #f0f0eb; margin: 1.5rem 0; }
  .error { color: #c0392b; font-size: 13px; margin-top: 6px; padding: 10px; background: #fdf0f0; border-radius: 8px; }
  .api-wrap { margin-bottom: 1.5rem; }
  .api-label { font-size: 13px; color: #555; margin-bottom: 6px; display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>AI YouTube Script Generator</h1>
  <p class="sub">Enter a topic → get 4 viral video ideas → click one → get a full script</p>

  <div class="api-wrap">
    <label class="api-label" for="apiKey">Anthropic API key (starts with sk-ant-)</label>
    <input type="password" id="apiKey" placeholder="sk-ant-api03-..." />
  </div>

  <hr class="divider">

  <p class="step-hint">1. Enter a broad topic</p>
  <div class="row">
    <input type="text" id="topicInput" placeholder="e.g. making money with AI, passive income" />
    <button id="genBtn" onclick="generateIdeas()">Get ideas</button>
  </div>

  <div id="loadingMsg" class="loading" style="display:none">Generating...</div>
  <div id="errorMsg" class="error" style="display:none"></div>

  <div id="ideasSection" style="display:none">
    <p class="step-hint">2. Click an idea to generate the full script</p>
    <div class="ideas-grid" id="ideasGrid"></div>
  </div>

  <div id="scriptSection" style="display:none">
    <div class="script-box">
      <p class="script-label">Script</p>
      <div class="script-text" id="scriptText"></div>
      <button class="copy-btn" onclick="copyScript()">Copy script</button>
    </div>
  </div>
</div>

<script>
var currentScript = '';

document.getElementById('topicInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') generateIdeas();
});

function getKey() {
  return document.getElementById('apiKey').value.trim();
}

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function setLoading(on) {
  document.getElementById('loadingMsg').style.display = on ? 'block' : 'none';
  document.getElementById('genBtn').disabled = on;
  if (on) hideError();
}

function callClaude(system, user, callback) {
  var key = getKey();
  if (!key) {
    showError('Please paste your Anthropic API key at the top first.');
    return;
  }

  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://api.anthropic.com/v1/messages');
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('x-api-key', key);
  xhr.setRequestHeader('anthropic-version', '2023-06-01');
  xhr.setRequestHeader('anthropic-dangerous-direct-browser-access', 'true');

  xhr.onload = function() {
    try {
      var data = JSON.parse(xhr.responseText);
      if (data.error) {
        showError('API error: ' + data.error.message);
        setLoading(false);
        return;
      }
      callback(data.content[0].text);
    } catch(e) {
      showError('Failed to parse response. Try again.');
      setLoading(false);
    }
  };

  xhr.onerror = function() {
    showError('Network error. Check your internet connection and try again.');
    setLoading(false);
  };

  xhr.send(JSON.stringify({
    model: 'claude-haiku-4-5-20251001',
    max_tokens: 1200,
    system: system,
    messages: [{ role: 'user', content: user }]
  }));
}

function generateIdeas() {
  var topic = document.getElementById('topicInput').value.trim();
  if (!topic) {
    showError('Please enter a topic first.');
    return;
  }

  setLoading(true);
  document.getElementById('ideasSection').style.display = 'none';
  document.getElementById('scriptSection').style.display = 'none';

  callClaude(
    'You generate viral YouTube video ideas for faceless channels about making money online and AI. Respond ONLY with a raw JSON array of exactly 4 objects. No markdown, no backticks, no explanation. Format: [{"title":"...","hook":"...","format":"..."}]',
    'Topic: ' + topic,
    function(text) {
      try {
        var clean = text.trim().replace(/^```json\n?/, '').replace(/^```\n?/, '').replace(/\n?```$/, '');
        var ideas = JSON.parse(clean);
        renderIdeas(ideas);
      } catch(e) {
        showError('Could not parse ideas. Try again. Raw: ' + text.substring(0, 100));
      }
      setLoading(false);
    }
  );
}

function renderIdeas(ideas) {
  var grid = document.getElementById('ideasGrid');
  grid.innerHTML = '';
  ideas.forEach(function(idea) {
    var card = document.createElement('div');
    card.className = 'idea-card';
    card.innerHTML =
      '<p class="idea-title">' + esc(idea.title) + '</p>' +
      '<span class="idea-format">' + esc(idea.format) + '</span>' +
      '<p class="idea-hook">' + esc(idea.hook) + '</p>';
    card.onclick = function() { selectIdea(card, idea); };
    grid.appendChild(card);
  });
  document.getElementById('ideasSection').style.display = 'block';
}

function selectIdea(card, idea) {
  document.querySelectorAll('.idea-card').forEach(function(c) { c.classList.remove('selected'); });
  card.classList.add('selected');
  setLoading(true);
  document.getElementById('scriptSection').style.display = 'none';

  callClaude(
    'You write engaging ready-to-use scripts for faceless YouTube videos about making money online and AI. Punchy, direct, conversational. Use these section labels on their own lines: [HOOK], [INTRO], [MAIN CONTENT], [CTA]. No markdown. Around 400 words.',
    'Write a full script for: "' + idea.title + '"\nHook: ' + idea.hook + '\nFormat: ' + idea.format,
    function(script) {
      currentScript = script;
      document.getElementById('scriptText').textContent = script;
      document.getElementById('scriptSection').style.display = 'block';
      setLoading(false);
    }
  );
}

function copyScript() {
  navigator.clipboard.writeText(currentScript).then(function() {
    var btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy script'; }, 2000);
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
